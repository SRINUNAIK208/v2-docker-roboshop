networks:
 default:
   driver: bridge
   name: roboshop
volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:
services:
  mongodb:
    image: srinunaik208/mongodb:v2
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  catalogue:
    image: srinunaik208/catalogue:v2
    container_name: catalogue
    environment:
      MONGO: "true" 
      MONGO_URL: "mongodb://mongodb:27017/catalogue"
    depends_on:
    - mongodb
  redis:
    image: redis:7
    container_name: redis
    volumes:
    - redis:/data

  user:
    image: srinunaik208/user:v2 
    container_name: user 
    environment:
      MONGO: "true"
      REDIS_URL: "redis://redis:6379"
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
    - mongodb
    - redis
  cart: 
    image: srinunaik208/cart:v2 
    container_name: cart 
    environment:
      REDIS_HOST: "redis"
      CATALOGUE_HOST: "catalogue"
      CATALOGUE_PORT: "8080"
    depends_on:
    - redis
    - catalogue
  mysql:
    image: srinunaik208/mysql:v2
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql

  shipping:
    image: srinunaik208/shipping:v2 
    container_name: shipping 
    environment:
      CART_ENDPOINT: "cart:8080"
      DB_HOST: "mysql"
    depends_on:
    - cart
    - mysql
  rabbitmq:
    image: rabbitmq
    container_name: rabbitmq
    environment:
     RABBITMQ_DEFAULT_USER: roboshop
     RABBITMQ_DEFAULT_PASS: roboshop123
    volumes:
    - rabbitmq:/var/lib/rabbitmq
  payment:
    image: srinunaik208/payment:v2 
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: "8080"
      USER_HOST: user
      USER_PORT: "8080"
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
    - cart
    - user 
    - rabbitmq
  frontend:
    image: srinunaik/frontend:v2 
    container_name: frontend
    depends_on:
     - catalogue 
     - user 
     - cart 
     - shipping 
     - payment
